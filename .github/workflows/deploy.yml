name: Deploy to Yandex Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: cr.yandex/crpusm23v7g9ch5c5t9h
  IMAGE_NAME: naranja-backend
  CONTAINER_ID: bba12ti21lgmv9glfl7k
  SERVICE_ACCOUNT_ID: ajep2inmg605fd6ttbb2

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Yandex Cloud CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH

      - name: Login to Yandex Container Registry
        env:
          YC_SA_KEY: ${{ secrets.YC_SA_KEY_JSON }}
        run: |
          echo "$YC_SA_KEY" | docker login cr.yandex --username json_key --password-stdin

      - name: Generate deploy tag
        id: tag
        run: echo "tag=deploy-$(date +%s)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=https://zphehhzgbudetyzezunk.supabase.co
            NEXT_PUBLIC_SUPABASE_ANON_KEY=sb_publishable_Uyz3DPUyEZFkfXzDTOUiJg_aupb397O
            NEXT_PUBLIC_SITE_URL=https://naranja.outmilk.online

      - name: Create container revision
        run: |
          echo "$YC_SA_KEY" > /tmp/yc-sa-key.json
          yc config set service-account-key /tmp/yc-sa-key.json
          ENV_VARS="NEXT_PUBLIC_SUPABASE_URL=https://zphehhzgbudetyzezunk.supabase.co"
          ENV_VARS="$ENV_VARS,NEXT_PUBLIC_SUPABASE_ANON_KEY=sb_publishable_Uyz3DPUyEZFkfXzDTOUiJg_aupb397O"
          ENV_VARS="$ENV_VARS,SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_KEY"
          ENV_VARS="$ENV_VARS,NEXT_PUBLIC_SITE_URL=https://naranja.outmilk.online"
          ENV_VARS="$ENV_VARS,YANDEX_API_KEY=$YANDEX_KEY"
          ENV_VARS="$ENV_VARS,YANDEX_FOLDER_ID=b1gsrqv6ri6jr7ue41fc"
          yc serverless container revision deploy \
            --container-id ${{ env.CONTAINER_ID }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} \
            --service-account-id ${{ env.SERVICE_ACCOUNT_ID }} \
            --memory 1GB \
            --cores 1 \
            --execution-timeout 300s \
            --concurrency 8 \
            --environment "$ENV_VARS"
        env:
          YC_SA_KEY: ${{ secrets.YC_SA_KEY_JSON }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          YANDEX_KEY: ${{ secrets.YANDEX_API_KEY }}

      - name: Health check
        run: |
          for i in 1 2 3 4 5 6; do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://bba12ti21lgmv9glfl7k.containers.yandexcloud.net/ || echo "000")
            echo "Attempt $i: HTTP $status"
            if [ "$status" = "200" ]; then
              exit 0
            fi
            sleep 10
          done
          exit 1
