name: Deploy to Yandex Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: cr.yandex/crpusm23v7g9ch5c5t9h
  IMAGE_NAME: naranja-backend
  CONTAINER_ID: bba12ti21lgmv9glfl7k
  SERVICE_ACCOUNT_ID: ajep2inmg605fd6ttbb2

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Yandex Container Registry
        uses: docker/login-action@v3
        with:
          registry: cr.yandex
          username: json_key
          password: ${{ secrets.YC_SA_KEY_JSON }}

      - name: Generate deploy tag
        id: tag
        run: echo "tag=deploy-$(date +%s)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}

      - name: Save SA key for yc CLI
        run: echo '${{ secrets.YC_SA_KEY_JSON }}' > /tmp/yc-sa-key.json

      - name: Install Yandex Cloud CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH

      - name: Create container revision
        run: |
          yc serverless container revision deploy \
            --container-id ${{ env.CONTAINER_ID }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} \
            --service-account-id ${{ env.SERVICE_ACCOUNT_ID }} \
            --memory 1GB \
            --cores 1 \
            --execution-timeout 300s \
            --concurrency 8
        env:
          YC_SERVICE_ACCOUNT_KEY_FILE: /tmp/yc-sa-key.json

      - name: Health check
        run: |
          sleep 15
          curl -so /dev/null -w "%{http_code}" https://naranja.outmilk.online
